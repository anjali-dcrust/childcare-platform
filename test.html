<!DOCTYPE html>
<html>
<head>
    <title>Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <h2>Chat Test</h2>
    <input id="token" placeholder="Paste JWT token" style="width:400px"><br><br>
    <input id="bookingId" placeholder="Booking ID" value="1"><br><br>
    <button onclick="connect()">Connect</button><br><br>
    <input id="messageInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
    <div id="messages"></div>

    <script>
        let stompClient = null;

        function connect() {
            const socket = new SockJS('http://localhost:8080/ws-chat');
            stompClient = Stomp.over(socket);

            const token = document.getElementById('token').value;
            const bookingId = document.getElementById('bookingId').value;

            stompClient.connect(
                { Authorization: 'Bearer ' + token },
                function () {
                    console.log('Connected');
                    stompClient.subscribe('/topic/chat/' + bookingId, function (message) {
                        const msg = JSON.parse(message.body);
                        document.getElementById('messages').innerHTML +=
                            '<p><b>' + msg.senderName + ':</b> ' + msg.content + '</p>';
                    });
                }
            );
        }

        function sendMessage() {
            const bookingId = document.getElementById('bookingId').value;
            const content = document.getElementById('messageInput').value;

            stompClient.send('/app/chat.send', {}, JSON.stringify({
                bookingId: bookingId,
                content: content
            }));

            document.getElementById('messageInput').value = '';
        }
    </script>
</body>
</html>
