spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/childcare_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: your_secret_key
  expiration: 86400000

server:
  port: 8080