spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/childcare_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: childcare-service

jwt:
  secret: your_secret_key
  expiration: 86400000

server:
  port: 8080