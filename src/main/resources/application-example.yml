spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/childcare_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: childcare-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_16_char_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: your_secret_key
  expiration: 86400000

server:
  port: 8080