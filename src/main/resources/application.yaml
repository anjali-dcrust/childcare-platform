server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/childcare_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
jwt:
  secret: childcare_super_secret_key_minimum_32_chars
  expiration: 86400000